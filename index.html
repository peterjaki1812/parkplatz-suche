<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#1a1a1a;color:white}

/* HEADER */
h1{text-align:center;padding:12px;background:#2d6a2d;color:white;font-size:24px;letter-spacing:1px}
h2{text-align:center;padding:6px;background:#2d6a2d;color:#c8e6c8;font-size:14px;font-weight:normal;letter-spacing:2px}

/* BUTTONS */
.buttons{display:flex;justify-content:center;gap:15px;padding:12px;background:#222;border-bottom:1px solid #444}
button{padding:12px 30px;font-size:16px;font-weight:bold;border:none;border-radius:25px;cursor:pointer;color:white;transition:0.2s}
#btn-nah{background:#2d6a2d;border:2px solid #1e4d1e}
#btn-mittel{background:#00008B;border:2px solid #000055}
#btn-fern{background:#e07b00;border:2px solid #9c5600}

#info{text-align:center;padding:10px;font-size:15px;color:#a5d6a7;background:#111;font-weight:bold}

/* MAP */
#map{width:100%;height:500px;background:#222}

/* MARKER */
.custom-marker{width:24px;height:24px;border-radius:50%;border:3px solid #fff;outline:2px solid #000;box-shadow:0 0 10px rgba(0,0,0,1);display:block}

/* POPUP */
.leaflet-popup-content-wrapper{background:#1a1a1a;color:white;border-radius:12px;border:2px solid #444;width:300px}
.popup-info h3{color:#fff;background:#0033cc;padding:6px 8px;border-radius:4px;margin-bottom:8px;font-size:16px;text-align:center}
.popup-info p{margin:5px 0;font-size:13px;line-height:1.4;border-bottom:1px solid #333;padding-bottom:4px}
.popup-info b{color:#81c784}
.popup-navi{color:#ffcc00;font-size:13px;font-weight:bold}

/* TOUR-KARTEN */
#touren-liste{padding:15px;display:flex;flex-direction:column;gap:12px;max-width:1000px;margin:0 auto}
.tour-karte{background:#2a2a2a;border-radius:12px;padding:15px;border-left:10px solid;color:#ddd}
.tour-karte.nah{border-left-color:#2d6a2d}
.tour-karte.mittel{border-left-color:#00008B}
.tour-karte.fern{border-left-color:#e07b00}
.address-box{color:#ffcc00;font-size:1em;font-weight:bold;display:block;margin-top:5px;border:1px dashed #555;padding:6px;background:#111;border-radius:6px}
.park-hinweis{color:#ff9800;font-size:12px;display:block;margin-top:4px;}
.hm-badge{display:inline-block;background:#333;color:#81c784;padding:2px 8px;border-radius:10px;font-size:12px;margin-left:8px}

/* ABSTIMMUNG */
#abstimmung-bereich{max-width:1000px;margin:0 auto;padding:15px}
.abstimmung-box{background:#1e1e1e;border-radius:16px;padding:20px;border:2px solid #444;margin-top:10px}
.abstimmung-box h3{text-align:center;color:#a5d6a7;font-size:20px;margin-bottom:15px}
.vote-btn{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;font-size:15px;font-weight:bold;cursor:pointer;color:white;background:#333;transition:0.2s;text-align:left}
.vote-btn:hover{background:#555}
.vote-bar-wrap{margin:8px 0}
.vote-bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:14px;color:#ccc}
.vote-bar-bg{background:#333;border-radius:10px;height:22px;overflow:hidden}
.vote-bar-fill{height:100%;border-radius:10px;transition:width 0.5s}
.vote-gesamt{text-align:center;color:#aaa;font-size:13px;margin-top:10px}
.bereits-abgestimmt{text-align:center;color:#ff9800;font-size:14px;font-weight:bold;padding:10px;background:#2a2000;border-radius:8px;margin-top:10px}
.reset-bereich{text-align:center;margin-top:20px;padding:15px;background:#111;border-radius:12px;border:1px dashed #555}
.reset-bereich input{padding:8px 15px;border-radius:8px;border:1px solid #555;background:#222;color:white;font-size:14px;margin-right:10px}
.reset-btn{padding:8px 20px;background:#8b0000;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer;font-size:14px}
.reset-btn:hover{background:#cc0000}

/* IMPRESSUM */
#impressum{padding:30px;background:#111;font-size:0.85em;border-top:1px solid #333;color:#777;text-align:center}
</style>
</head>

/* ===========================
   ABSTIMMUNG + FUNKTIONEN
   =========================== */

function ladeStimmen(){
    var d=localStorage.getItem('wf_stimmen');
    return d?JSON.parse(d):{tour0:0,tour1:0,tour2:0,gesamt:0};
}

function speichereStimmen(s){
    localStorage.setItem('wf_stimmen',JSON.stringify(s));
}

function hatAbgestimmt(){
    return localStorage.getItem('wf_hat_abgestimmt')==='ja';
}

function abstimmen(i){
    if(hatAbgestimmt())return;
    var s=ladeStimmen();
    s['tour'+i]++;
    s.gesamt++;
    speichereStimmen(s);
    localStorage.setItem('wf_hat_abgestimmt','ja');
    zeigeAbstimmung();
}

function resetStimmen(){
    var pw=document.getElementById('reset-pw').value;
    if(pw===RESET_PASSWORT){
        localStorage.removeItem('wf_stimmen');
        localStorage.removeItem('wf_hat_abgestimmt');
        document.getElementById('reset-pw').value='';
        zeigeAbstimmung();
        alert('✅ Abstimmung zurückgesetzt!');
    } else {
        alert('❌ Falsches Passwort!');
    }
}

function zeigeAbstimmung(){
    if(aktuelleTouren.length===0)return;

    var s=ladeStimmen();
    var ab=hatAbgestimmt();
    var fc=['#2d6a2d','#00008B','#e07b00'];

    var h='<div class="abstimmung-box"><h3>🗳️ Für welche Tour stimmt ihr ab?</h3>';

    if(!ab){
        aktuelleTouren.forEach(function(t,i){
            h+='<button class="vote-btn" onclick="abstimmen('+i+')">👍 Tour '+(i+1)+': '+t.name+'</button>';
        });
    } else {
        var g=s.gesamt||1;
        aktuelleTouren.forEach(function(t,i){
            var a=s['tour'+i]||0;
            var p=Math.round((a/g)*100);
            h+='<div class="vote-bar-wrap"><div class="vote-bar-label"><span>Tour '+(i+1)+': '+t.name+'</span><span>'+p+'% ('+a+' Stimmen)</span></div><div class="vote-bar-bg"><div class="vote-bar-fill" style="width:'+p+'%;background:'+fc[i]+';"></div></div></div>';
        });
        h+='<div class="vote-gesamt">Gesamt: '+g+' Stimme(n) abgegeben</div><div class="bereits-abgestimmt">✅ Du hast bereits abgestimmt!</div>';
    }

    h+='<div class="reset-bereich"><p style="color:#aaa;margin-bottom:8px;font-size:13px;">🔐 Nur für den Besitzer:</p><input type="password" id="reset-pw" placeholder="Passwort eingeben"/><button class="reset-btn" onclick="resetStimmen()">🔄 Reset</button></div></div>';

    document.getElementById('abstimmung-bereich').innerHTML=h;
}

/* ===========================
   TOUR-ANZEIGE
   =========================== */

function zeigeTour(bereich){
    var pool=touren[bereich];

    if(!pool||pool.length===0){
        document.getElementById('info').innerText='⏳ Diese Touren folgen bald!';
        document.getElementById('touren-liste').innerHTML='';
        document.getElementById('abstimmung-bereich').innerHTML='';
        return;
    }

    aktiveMarker.forEach(m=>map.removeLayer(m));
    aktiveMarker=[];

    var si=rotationState[bereich];
    aktuelleTouren=[];

    for(let i=0;i<Math.min(pool.length,3);i++){
        aktuelleTouren.push(pool[(si+i)%pool.length]);
    }

    rotationState[bereich]=(si+3)%pool.length;

    var bounds=[];
    var lh='';

    aktuelleTouren.forEach(tour=>{
        var icon=L.divIcon({
            className:'custom-div-icon',
            html:'<div class="custom-marker" style="background-color:'+farben[bereich]+';"></div>',
            iconSize:[26,26],
            iconAnchor:[13,13]
        });

        var m=L.marker(tour.start,{icon:icon}).addTo(map);

        m.bindPopup(
            '<div class="popup-info">'+
            '<h3>'+tour.name+'</h3>'+
            '<p><b>📏 Strecke:</b> '+tour.km+' &nbsp;|&nbsp; <b>⛰️ Höhenmeter:</b> '+tour.hm+'</p>'+
            '<p><b>✨ Highlights:</b> '+tour.highlights+'</p>'+
            '<p><b>🍴 Einkehr:</b> '+tour.restaurant+'</p>'+
            '<p><b>🅿️ Navi-Adresse:</b><br><span class="popup-navi">'+tour.parkplatz+'</span></p>'+
            '</div>'
        );

        aktiveMarker.push(m);
        bounds.push(tour.start);

        var restName=getRestaurantName(tour.restaurant);

        lh+=
        '<div class="tour-karte '+bereich+'">'+
        '<h3>🥾 '+tour.name+' <span class="hm-badge">⛰️ '+tour.hm+'</span></h3>'+
        '<p><b>📏 Strecke:</b> '+tour.km+' &nbsp;|&nbsp; <b>⛰️ Höhenmeter:</b> '+tour.hm+'</p>'+
        '<p><b>🅿️ Navi-Adresse:</b></p>'+
        '<span class="address-box">📍 '+tour.parkplatz+'</span>'+
        '<span class="park-hinweis">⚠️ Bitte Parkgebühren vor Ort prüfen</span>'+
        '<p style="margin-top:8px;"><b>✨ Highlights:</b> '+tour.highlights+'</p>'+
        '<p><b>🍴 Gastro:</b> '+tour.restaurant+'</p>'+
        '<a href="https://www.google.com/search?q='+encodeURIComponent(restName)+'" target="_blank" style="display:inline-block;margin-top:8px;padding:6px 14px;background:#c0392b;color:white;border-radius:8px;font-size:13px;text-decoration:none;">🍽️ '+restName+' googeln</a>'+
        '</div>';
    });

    if(bounds.length>0){
        map.flyToBounds(bounds,{padding:[60,60],duration:1.5});
    }

    document.getElementById('touren-liste').innerHTML=lh;
    document.getElementById('info').innerText='✅ 3 Touren gefunden! Nochmal klicken für andere Vorschläge.';
    zeigeAbstimmung();
}

</script>
