function ladeStimmen(){var d=localStorage.getItem('wf_stimmen');return d?JSON.parse(d):{tour0:0,tour1:0,tour2:0,gesamt:0}}
function speichereStimmen(s){localStorage.setItem('wf_stimmen',JSON.stringify(s))}
function hatAbgestimmt(){return localStorage.getItem('wf_hat_abgestimmt')==='ja'}
function abstimmen(i){if(hatAbgestimmt())return;var s=ladeStimmen();s['tour'+i]++;s.gesamt++;speichereStimmen(s);localStorage.setItem('wf_hat_abgestimmt','ja');zeigeAbstimmung()}
function resetStimmen(){var pw=document.getElementById('reset-pw').value;if(pw===RESET_PASSWORT){localStorage.removeItem('wf_stimmen');localStorage.removeItem('wf_hat_abgestimmt');document.getElementById('reset-pw').value='';zeigeAbstimmung();alert('✅ Abstimmung zurückgesetzt!')}else{alert('❌ Falsches Passwort!')}}
function zeigeAbstimmung(){
if(aktuelleTouren.length===0)return;
var s=ladeStimmen(),ab=hatAbgestimmt();
var fc=['#2d6a2d','#00008B','#e07b00'];
var h='<div class="abstimmung-box"><h3>🗳️ Für welche Tour stimmt ihr ab?</h3>';
if(!ab){aktuelleTouren.forEach(function(t,i){h+='<button class="vote-btn" onclick="abstimmen('+i+')">👍 Tour '+(i+1)+': '+t.name+'</button>';});}
else{
var g=s.gesamt||1;
h+='<div class="chart-container">';
aktuelleTouren.forEach(function(t,i){
var a=s['tour'+i]||0,p=Math.round((a/g)*100);
h+='<div class="chart-col"><div class="chart-label-top"><div class="chart-pct">'+p+'%</div><div class="chart-votes">'+a+' Stimmen</div></div><div class="chart-bar" style="height:'+p+'%;background:'+fc[i]+';"></div><div class="chart-name">Tour '+(i+1)+'<br><b>'+t.name+'</b></div></div>';
});
h+='</div><div class="vote-gesamt">👥 Gesamt: '+g+' Stimme(n)</div><div class="bereits-abgestimmt">✅ Du hast bereits abgestimmt!</div>';
}
h+='<div class="reset-bereich"><p style="color:#aaa;margin-bottom:6px;font-size:12px;">🔐 Nur für den Besitzer:</p><input type="password" id="reset-pw" placeholder="Passwort"/><button class="reset-btn" onclick="resetStimmen()">🔄 Reset</button></div></div>';
document.getElementById('abstimmung-bereich').innerHTML=h;
}
function zeigeTour(bereich){
var pool=touren[bereich];
if(!pool||pool.length===0){document.getElementById('info').innerText='⏳ Diese Touren folgen bald!';document.getElementById('touren-liste').innerHTML='';document.getElementById('abstimmung-bereich').innerHTML='';return;}
aktiveMarker.forEach(m=>map.removeLayer(m));aktiveMarker=[];
var si=rotationState[bereich];aktuelleTouren=[];
for(let i=0;i<Math.min(pool.length,3);i++)aktuelleTouren.push(pool[(si+i)%pool.length]);
rotationState[bereich]=(si+3)%pool.length;
var bounds=[],lh='';
aktuelleTouren.forEach(tour=>{
var icon=L.divIcon({className:'custom-div-icon',html:'<div class="custom-marker" style="background-color:'+farben[bereich]+';"></div>',iconSize:[26,26],iconAnchor:[13,13]});
var m=L.marker(tour.start,{icon:icon}).addTo(map);
m.bindPopup('<div class="popup-info"><h3>'+tour.name+'</h3><p><b>📏 Strecke:</b> '+tour.km+' | <b>⛰️ HM:</b> '+tour.hm+'</p><p><b>✨ Highlights:</b> '+tour.highlights+'</p><p><b>🍴 Einkehr:</b> '+tour.restaurant+'</p><p><b>🅿️ Navi:</b><br><span class="popup-navi">'+tour.parkplatz+'</span></p></div>');
aktiveMarker.push(m);bounds.push(tour.start);
var rn=getRestaurantName(tour.restaurant);
lh+='<div class="tour-karte '+bereich+'"><h3>🥾 '+tour.name+' <span class="hm-badge">⛰️ '+tour.hm+'</span></h3>';
lh+='<p><b>📏</b> '+tour.km+' | <b>⛰️</b> '+tour.hm+'</p>';
lh+='<p><b>🅿️ Navi:</b></p><span class="address-box">📍 '+tour.parkplatz+'</span>';
lh+='<span class="park-hinweis">⚠️ Parkgebühren vor Ort prüfen</span>';
lh+='<p><b>✨</b> '+tour.highlights+'</p>';
lh+='<p><b>🍴</b> '+tour.restaurant+'</p>';
lh+='<a href="https://www.google.com/search?q='+encodeURIComponent(rn)+'" target="_blank" style="display:inline-block;margin-top:6px;padding:5px 12px;background:#c0392b;color:white;border-radius:6px;font-size:12px;text-decoration:none;">🍽️ Speisekarte googeln</a></div>';
});
if(bounds.length>0)map.flyToBounds(bounds,{padding:[60,60],duration:1.5});
document.getElementById('touren-liste').innerHTML=lh;
document.getElementById('info').innerText='✅ 3 Touren gefunden! Nochmal klicken für andere Vorschläge.';
zeigeAbstimmung();
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}
</script>
