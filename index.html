<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderPark - Große Gratis-Parkplätze</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .search-box {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 8px; background: white;
            padding: 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 85%; max-width: 450px;
        }
        
        input { flex: 1; border: 1px solid #ccc; padding: 10px; border-radius: 6px; }
        button { background: #0052cc; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #loader {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: #0052cc; color: white; padding: 8px 20px;
            border-radius: 25px; display: none; font-size: 14px; font-weight: bold;
        }

        .p-marker {
            background-color: #0052cc; color: white; border: 2px solid white;
            border-radius: 5px; text-align: center; font-weight: bold;
            font-size: 16px; line-height: 26px; width: 28px !important; height: 28px !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="target" placeholder="Ort oder Wanderziel suchen...">
        <button onclick="manualSearch()">Suche</button>
    </div>

    <div id="loader">Suche große Parkflächen...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, parkingLayer, lastPos = null, searchTimer;

        function init() {
            map = L.map('map', { zoomControl: false }).setView([51.16, 10.45], 6);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            parkingLayer = L.layerGroup().addTo(map);

            map.locate({setView: true, maxZoom: 14});
            map.on('locationfound', e => fetchData(e.latlng));

            map.on('moveend', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => fetchData(map.getCenter()), 600);
            });
        }

        async function manualSearch() {
            const val = document.getElementById('target').value;
            if (!val) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}`);
            const data = await res.json();
            if (data.length > 0) {
                const ll = L.latLng(data[0].lat, data[0].lon);
                map.setView(ll, 14);
                fetchData(ll);
            }
        }

        async function fetchData(ll) {
            // Verhindert doppelte Suche bei minimaler Bewegung
            if (lastPos && map.distance(lastPos, ll) < 150) return;
            lastPos = ll;

            const loader = document.getElementById('loader');
            loader.style.display = 'block';

            // VERBESSERTER FILTER:
            // 1. Nur "ways" (Flächen), keine einzelnen Punkte (nodes) -> Schließt Mini-Buchten aus.
            // 2. Muss "surface" (Bodenfläche) sein.
            // 3. Schließt alles aus, was keinen Straßenzugang hat oder nur für Kunden ist.
            const query = `
                [out:json][timeout:20];
                (
                  way["amenity"="parking"]["fee"!="yes"]["access"!~"customers|private|no"]["parking"="surface"](around:2500,${ll.lat},${ll.lng});
                  way["amenity"="parking"]["parking:condition"~"free"](around:2500,${ll.lat},${ll.lng});
                );
                out center;`;

            try {
                const r = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const d = await r.json();
                
                parkingLayer.clearLayers();
                d.elements.forEach(el => {
                    const coords = [el.center.lat, el.center.lon];
                    
                    // Den Namen bevorzugt behandeln (z.B. "Wanderparkplatz X")
                    let name = el.tags.name || el.tags.operator || "Große Parkfläche";
                    
                    const icon = L.divIcon({ className: 'p-marker', html: 'P' });
                    L.marker(coords, { icon: icon }).addTo(parkingLayer)
                     .bindPopup(`<b>${name}</b><br>Kostenlose Fläche ohne Gebühr`);
                });
            } catch (e) {
                console.error("API Fehler", e);
            } finally {
                loader.style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
