<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parken & Gastro Suche</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .info-box {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 200px;
            border: 2px solid #003399;
        }
        .status-text { font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="info-box">
    <div id="status" class="status-text">Suche läuft (3km Umkreis)...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Karte initialisieren (Zentrum Krefeld)
    const map = L.map('map').setView([51.333, 6.562], 14);
    const statusBox = document.getElementById('status');

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Icons definieren
    const iconParking = L.divIcon({
        html: '<i class="fa-solid fa-square-p" style="color: #003399; font-size: 26px; text-shadow: 1px 1px 2px white;"></i>',
        className: 'custom-icon', iconSize: [26, 26], iconAnchor: [13, 13]
    });

    const iconResto = L.divIcon({
        html: '<i class="fa-solid fa-utensils" style="color: #d35400; font-size: 22px; text-shadow: 1px 1px 2px white;"></i>',
        className: 'custom-icon', iconSize: [22, 22], iconAnchor: [11, 11]
    });

    const iconIce = L.divIcon({
        html: '<i class="fa-solid fa-ice-cream" style="color: #ff4d94; font-size: 22px; text-shadow: 1px 1px 2px white;"></i>',
        className: 'custom-icon', iconSize: [22, 22], iconAnchor: [11, 11]
    });

    // Standort finden
    map.locate({setView: true, maxZoom: 15});

    map.on('locationfound', (e) => {
        L.marker(e.latlng).addTo(map).bindPopup("<b>Dein Standort</b>").openPopup();
        fetchData(e.latlng.lat, e.latlng.lng);
    });

    async function fetchData(lat, lng) {
        const radius = 3000; // Festgelegt auf 3km
        
        // Die Abfrage sucht nun gezielt:
        // 1. Parkplätze (keine Parkhäuser, keine Tiefgaragen)
        // 2. Restaurants
        // 3. Eisdielen
        const query = `
            [out:json][timeout:30];
            (
              node["amenity"="parking"]["parking"!="multi-storey"]["parking"!="underground"](around:${radius},${lat},${lng});
              way["amenity"="parking"]["parking"!="multi-storey"]["parking"!="underground"](around:${radius},${lat},${lng});
              node["amenity"="restaurant"](around:${radius},${lat},${lng});
              node["amenity"="ice_cream"](around:${radius},${lat},${lng});
            );
            out center;
        `;

        try {
            const response = await fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query));
            const data = await response.json();
            
            if (!data.elements || data.elements.length === 0) {
                statusBox.innerHTML = "Nichts gefunden (3km Radius)";
                return;
            }

            data.elements.forEach(el => {
                const pos = el.type === 'node' ? [el.lat, el.lon] : [el.center.lat, el.center.lng];
                let currentIcon = iconParking;
                let info = "Parkplatz";

                // Filter für Privatparkplätze / Supermärkte (grobe Filterung)
                const name = el.tags.name || "";
                const isSupermarket = name.toLowerCase().match(/(aldi|lidl|rewe|edeka|netto|penny|kaufland)/);
                
                if (el.tags.access === 'private' || el.tags.access === 'customers' || isSupermarket) {
                    return; // Überspringen
                }

                if (el.tags.amenity === 'restaurant') {
                    currentIcon = iconResto;
                    info = "Restaurant";
                } else if (el.tags.amenity === 'ice_cream') {
                    currentIcon = iconIce;
                    info = "Eisdiele";
                }

                L.marker(pos, {icon: currentIcon})
                    .addTo(map)
                    .bindPopup(`<b>${name || info}</b><br>${info}`);
            });
            statusBox.innerHTML = "Suche abgeschlossen!";
        } catch (err) {
            statusBox.innerHTML = "Fehler beim Laden der Daten.";
        }
    }
</script>

<div style="position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); font-size: 11px; text-align: center; z-index: 1001; padding: 5px; border-top: 1px solid #ccc;">
    Impressum: Peter Jaki | Kontakt: peterjaki@example.com | Daten von OpenStreetMap
</div>

</body>
</html>
