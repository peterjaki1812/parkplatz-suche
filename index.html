<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkFinder - Wanderparkplätze & Co.</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .search-container {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 8px;
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            width: 85%;
            max-width: 450px;
        }
        
        input { flex-grow: 1; border: 1px solid #ccc; padding: 10px; border-radius: 6px; outline: none; }
        button { background: #0052cc; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #003d99; }
        
        .loading-shimmer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 82, 204, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            display: none;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Parkplatz-Icon Style */
        .p-icon {
            background-color: #0052cc;
            color: white;
            border: 2px solid white;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            line-height: 22px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="cityInput" placeholder="Ort oder Adresse suchen...">
        <button onclick="searchLocation()">Suche</button>
    </div>

    <div id="status" class="loading-shimmer">Suche große Gratis-Parkplätze...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, userMarker, radiusCircle, parkingLayer;
        let lastPos = null;

        function initMap() {
            // Karte initialisieren
            map = L.map('map', { zoomControl: false }).setView([51.1657, 10.4515], 6);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            parkingLayer = L.layerGroup().addTo(map);

            // 1. Start am eigenen Standort
            map.locate({setView: true, maxZoom: 15});

            map.on('locationfound', function(e) {
                updatePosition(e.latlng, true);
            });

            // 2. Suche beim Verschieben der Karte
            map.on('moveend', function() {
                const center = map.getCenter();
                // Nur neu laden, wenn wir uns mehr als 200m bewegt haben (Performance)
                if (!lastPos || map.distance(lastPos, center) > 200) {
                    fetchParkingData(center);
                }
            });
        }

        function updatePosition(latlng, setRadius = false) {
            lastPos = latlng;
            
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(latlng).addTo(map).bindPopup("Ihr Suchpunkt");

            if (setRadius) {
                if (radiusCircle) map.removeLayer(radiusCircle);
                radiusCircle = L.circle(latlng, {
                    color: '#0052cc',
                    fillColor: '#0052cc',
                    fillOpacity: 0.1,
                    radius: 1000 // 1km Radius
                }).addTo(map);
            }

            fetchParkingData(latlng);
        }

        async function searchLocation() {
            const query = document.getElementById('cityInput').value;
            if (!query) return;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (data.length > 0) {
                    const latlng = L.latLng(data[0].lat, data[0].lon);
                    map.setView(latlng, 15);
                    updatePosition(latlng, true);
                }
            } catch (err) { console.error(err); }
        }

        async function fetchParkingData(latlng) {
            const statusEl = document.getElementById('status');
            statusEl.style.display = 'block';
            lastPos = latlng;

            // Der Overpass-Filter:
            // - amenity=parking & fee=no
            // - parking=surface (Nur Bodenflächen, keine Buchten am Rand)
            // - Ausschluss von Kunden/Privat (access)
            // - Ausschluss von Buchten (parking=lane / street_side)
            const query = `
                [out:json][timeout:25];
                (
                  node["amenity"="parking"]["fee"="no"]["parking"="surface"]["access"!~"customers|private"]["parking"!~"lane|street_side"](around:2000,${latlng.lat},${latlng.lng});
                  way["amenity"="parking"]["fee"="no"]["parking"="surface"]["access"!~"customers|private"]["parking"!~"lane|street_side"](around:2000,${latlng.lat},${latlng.lng});
                );
                out center;`;

            const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // Wir löschen die alten Marker nicht sofort, um Flackern zu vermeiden, 
                // aber hier für die Übersichtlichkeit der neuen Suche:
                parkingLayer.clearLayers();

                data.elements.forEach(el => {
                    const pos = el.type === 'node' ? [el.lat, el.lon] : [el.center.lat, el.center.lon];
                    const name = el.tags.name || "Kostenloser Parkplatz";
                    const surface = el.tags.surface ? `<br>Untergrund: ${el.tags.surface}` : "";

                    const pIcon = L.divIcon({
                        className: 'p-icon',
                        html: 'P',
                        iconSize: [26, 26]
                    });

                    L.marker(pos, { icon: pIcon })
                        .addTo(parkingLayer)
                        .bindPopup(`<b>${name}</b><br>Kostenlose Parkfläche${surface}`);
                });
            } catch (err) {
                console.error("Overpass Fehler:", err);
            } finally {
                statusEl.style.display = 'none';
            }
        }

        initMap();
    </script>
</body>
</html>
