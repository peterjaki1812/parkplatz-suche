<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parkplatz & Gastro Suche</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .info-box {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            text-align: center;
            width: 80%;
            max-width: 300px;
        }
    </style>
</head>
<body>

<div class="info-box">
    <strong>Suche aktiv...</strong><br>
    Kostenlose Parkplätze & Gastro
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([51.333, 6.562], 13); // Standard: Krefeld

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Eigene Icons definieren
    const iconParking = L.divIcon({
        html: '<i class="fa-solid fa-square-p" style="color: #003399; font-size: 24px;"></i>',
        className: 'custom-div-icon',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
    });

    const iconResto = L.divIcon({
        html: '<i class="fa-solid fa-utensils" style="color: #e67e22; font-size: 20px;"></i>',
        className: 'custom-div-icon',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
    });

    const iconIceCream = L.divIcon({
        html: '<i class="fa-solid fa-ice-cream" style="color: #e84393; font-size: 20px;"></i>',
        className: 'custom-div-icon',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
    });

    // Standort bestimmen
    map.locate({setView: true, maxZoom: 15});

    function onLocationFound(e) {
        L.marker(e.latlng).addTo(map).bindPopup("Du bist hier").openPopup();
        searchData(e.latlng.lat, e.latlng.lng);
    }
    map.on('locationfound', onLocationFound);

    async function searchData(lat, lng) {
        const radius = 3000; // 3km Umkreis
        
        // Overpass Query: 
        // 1. Kostenlose Parkplätze (keine Parkstreifen/Buchten)
        // 2. Restaurants & Eisdielen (mit Check auf Öffnung Sa 15-16 Uhr)
        const query = `
            [out:json][timeout:25];
            (
              node["amenity"="parking"]["fee"="no"](around:${radius},${lat},${lng});
              way["amenity"="parking"]["fee"="no"]["parking"!="multi-storey"]["parking"!="park_and_ride"](around:${radius},${lat},${lng});
              
              node["amenity"="restaurant"](around:${radius},${lat},${lng});
              node["amenity"="ice_cream"](around:${radius},${lat},${lng});
            );
            out body;
            >;
            out skel qt;
        `;

        const url = 'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query);

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            data.elements.forEach(el => {
                let pos;
                if (el.type === 'node') {
                    pos = [el.lat, el.lon];
                } else if (el.type === 'way' && el.center) {
                    pos = [el.center.lat, el.center.lng];
                }

                if (pos) {
                    let markerIcon = iconParking;
                    let typeLabel = "Kostenloser Parkplatz";

                    if (el.tags.amenity === 'restaurant') {
                        // Zeit-Filter Check (Grobprüfung falls Tag vorhanden)
                        if (el.tags.opening_hours && !el.tags.opening_hours.includes('Sa 15:00-16:00') && el.tags.opening_hours.includes('18:00')) {
                             return; // Überspringen, wenn es erst abends aufmacht
                        }
                        markerIcon = iconResto;
                        typeLabel = "Restaurant";
                    } else if (el.tags.amenity === 'ice_cream') {
                        markerIcon = iconIceCream;
                        typeLabel = "Eisdiele";
                    }

                    // Namen ermitteln
                    const name = el.tags.name || typeLabel;

                    L.marker(pos, {icon: markerIcon})
                        .addTo(map)
                        .bindPopup(`<strong>${name}</strong><br>${typeLabel}`);
                }
            });
            document.querySelector('.info-box').innerHTML = "Suche abgeschlossen<br>Viel Erfolg!";
        } catch (error) {
            console.error("Fehler bei der Suche:", error);
        }
    }
</script>

<div style="position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.8); font-size: 10px; text-align: center; z-index: 1001; padding: 2px;">
    Impressum: Peter Jaki | Kontakt: peterjaki@example.com | Alle Daten ohne Gewähr.
</div>

</body>
</html>
