<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderPark - Mit Radius</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        
        .search-box {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex; gap: 8px; background: white;
            padding: 10px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            width: 85%; max-width: 400px;
        }
        
        input { flex: 1; border: 1px solid #ddd; padding: 8px 12px; border-radius: 4px; outline: none; font-size: 16px; }
        button { background: #0052cc; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        #loader {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: #0052cc; color: white; padding: 8px 20px;
            border-radius: 20px; display: none; font-family: sans-serif; font-size: 13px; font-weight: bold;
        }

        .p-marker {
            background-color: #0052cc; color: white; border: 2px solid white;
            border-radius: 4px; text-align: center; font-weight: bold;
            font-size: 14px; line-height: 24px; width: 24px !important; height: 24px !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="target" placeholder="Ort suchen...">
        <button onclick="manualSearch()">Suche</button>
    </div>

    <div id="loader">Suche Parkplätze...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, parkingLayer, radiusCircle, searchTimer;
        let lastQueryLocation = null;

        function init() {
            map = L.map('map', { zoomControl: false, tap: false }).setView([51.16, 10.45], 6);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            parkingLayer = L.layerGroup().addTo(map);

            // Standort finden
            map.locate({setView: true, maxZoom: 13});
            
            map.on('locationfound', e => {
                updateRadius(e.latlng);
                fetchData(e.latlng);
            });

            // Suche beim Verschieben
            map.on('moveend', () => {
                const center = map.getCenter();
                if (!lastQueryLocation || map.distance(lastQueryLocation, center) > 1000) {
                    clearTimeout(searchTimer);
                    searchTimer = setTimeout(() => {
                        updateRadius(center);
                        fetchData(center);
                    }, 800);
                }
            });
        }

        function updateRadius(ll) {
            if (radiusCircle) {
                map.removeLayer(radiusCircle);
            }
            // Blauer Kreis mit 5km Radius
            radiusCircle = L.circle(ll, {
                color: '#0052cc',
                fillColor: '#0052cc',
                fillOpacity: 0.1,
                radius: 5000 // 5 km
            }).addTo(map);
        }

        async function manualSearch() {
            const val = document.getElementById('target').value;
            if (!val) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}`);
            const data = await res.json();
            if (data.length > 0) {
                const ll = L.latLng(data[0].lat, data[0].lon);
                map.setView(ll, 13);
                updateRadius(ll);
                fetchData(ll);
            }
        }

        async function fetchData(ll) {
            lastQueryLocation = ll;
            const loader = document.getElementById('loader');
            loader.style.display = 'block';

            // Suche im 5km Radius
            const query = `
                [out:json][timeout:30];
                (
                  node["amenity"="parking"]["fee"!="yes"]["access"!~"private|customers"]["parking"!~"street_side|lane|multi-storey"](around:5000,${ll.lat},${ll.lng});
                  way["amenity"="parking"]["fee"!="yes"]["access"!~"private|customers"]["parking"!~"street_side|lane|multi-storey"](around:5000,${ll.lat},${ll.lng});
                );
                out center;`;

            try {
                const r = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const d = await r.json();
                
                parkingLayer.clearLayers();
                d.elements.forEach(el => {
                    const coords = el.type === 'node' ? [el.lat, el.lon] : [el.center.lat, el.center.lon];
                    const tags = el.tags;
                    
                    const icon = L.divIcon({ className: 'p-marker', html: 'P' });
                    const name = tags.name || "Kostenloser Parkplatz";
                    
                    L.marker(coords, { icon: icon }).addTo(parkingLayer)
                     .bindPopup(`<b>${name}</b><br>${tags.surface ? 'Boden: ' + tags.surface : 'Naturplatz'}`);
                });
            } catch (e) {
                console.error("Fehler", e);
            } finally {
                loader.style.display = 'none';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
